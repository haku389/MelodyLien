name: StreetMelody
options:
  bundleIdPrefix: com.streetmelody
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  StreetMelody:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StreetMelody
        excludes:
          - "Resources/Info.plist"
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: StreetMelody/Resources/Info.plist
      properties:
        CFBundleName: StreetMelody
        CFBundleIdentifier: com.streetmelody.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSBluetoothAlwaysUsageDescription: "近くにいる人の推し曲を自動で受け取るために Bluetooth を使用します。"
        NSBluetoothPeripheralUsageDescription: "あなたの推し曲情報を近くにいる人に届けるために Bluetooth を使用します。"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # OAuth（Google/Spotify 等）のリダイレクト受け口。Supabase の Redirect URLs と一致させる。
        CFBundleURLTypes:
          - CFBundleURLName: com.streetmelody.app.oauth
            CFBundleURLSchemes:
              - com.streetmelody.app
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.streetmelody.app
        INFOPLIST_FILE: StreetMelody/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
