name: MelodyLien
options:
  bundleIdPrefix: com.melodylien
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  MelodyLien:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MelodyLien
        excludes:
          - "Resources/Info.plist"
    info:
      path: MelodyLien/Resources/Info.plist
      properties:
        CFBundleName: MelodyLien
        CFBundleIdentifier: com.melodylien.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSBluetoothAlwaysUsageDescription: "近くにいる人の推し曲を自動で受け取るために Bluetooth を使用します。"
        NSBluetoothPeripheralUsageDescription: "あなたの推し曲情報を近くにいる人に届けるために Bluetooth を使用します。"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.melodylien.app
        INFOPLIST_FILE: MelodyLien/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
