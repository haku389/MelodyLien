<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MelodyLien</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="phone" aria-label="MelodyLien prototype">

        <!-- ── メイン画面 ── -->
        <section class="screen active" id="home-screen"        data-screen="home"></section>
        <section class="screen"        id="melody-screen"      data-screen="melody"></section>
        <section class="screen"        id="piece-select-screen" data-screen="piece-select"></section>
        <section class="screen"        id="mystery-screen"     data-screen="mystery"></section>
        <section class="screen"        id="puzzle-screen"      data-screen="puzzle"></section>
        <section class="screen"        id="collection-screen"  data-screen="collection"></section>
        <section class="screen"        id="ranking-screen"     data-screen="ranking"></section>
        <section class="screen"        id="mypage-screen"      data-screen="mypage"></section>

        <!-- ── フッターナビ（5タブ） ── -->
        <nav class="bottom-nav" aria-label="主要ナビゲーション">
          <button class="nav-item active" data-target="home" type="button">
            <span>⌂</span>ホーム
          </button>
          <button class="nav-item" data-target="melody" type="button">
            <span>♫</span>メロディ
          </button>
          <button class="nav-item" data-target="collection" type="button">
            <span>◈</span>コレクション
          </button>
          <button class="nav-item" data-target="ranking" type="button">
            <span>↑</span>ランキング
          </button>
          <button class="nav-item" data-target="mypage" type="button">
            <span>☺</span>マイページ
          </button>
        </nav>
      </main>
    </div>

    <!-- 広告確認モーダル -->
    <div class="modal-backdrop" id="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="icon-close" id="close-modal" type="button" aria-label="閉じる">×</button>
        <img class="modal-mascot" src="./assets/mascot.svg" alt="" aria-hidden="true" />
        <div class="modal-content">
          <h2 class="modal-title" id="modal-title">広告を視聴してヒントを解放しますか？</h2>
          <p class="modal-body" id="modal-body">視聴すると以下の内容を解放できます。</p>
          <div class="modal-reward">
            <span>解放内容</span>
            <strong id="modal-reward-text">1つ目のヒントを見る</strong>
          </div>
          <p class="modal-note">※広告視聴後はキャンセルできません</p>
          <div class="modal-actions">
            <button class="btn secondary" id="cancel-modal" type="button">いいえ</button>
            <button class="btn primary" id="confirm-modal" type="button">視聴する</button>
          </div>
        </div>
      </div>
    </div>
    <div id="toast-root" aria-live="polite"></div>
    <div id="puzzle-complete-root"></div>
    <div id="auth-root"></div>

    <!-- 試聴モーダル -->
    <div id="preview-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(10,6,30,.75);align-items:center;justify-content:center;padding:24px;">
      <div style="background:#1a1030;border-radius:28px;padding:24px 20px 20px;width:100%;max-width:340px;box-shadow:0 24px 64px rgba(0,0,0,.6);">

        <!-- ヘッダー -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
          <div>
            <p style="font-size:10px;font-weight:900;color:rgba(255,255,255,.45);letter-spacing:.08em;margin-bottom:4px;">サビから試聴中</p>
            <strong id="preview-track-name" style="font-size:14px;display:block;color:#fff;"></strong>
            <p id="preview-artist-name" style="font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;"></p>
          </div>
          <button id="preview-close" type="button" style="background:rgba(255,255,255,.1);border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;color:rgba(255,255,255,.6);line-height:1;display:flex;align-items:center;justify-content:center;">×</button>
        </div>

        <!-- 波形アニメーション -->
        <div style="display:flex;align-items:flex-end;justify-content:center;gap:3px;height:48px;margin-bottom:20px;" id="preview-waveform">
          <style>
            @keyframes wave-bar { 0%,100%{height:6px} 50%{height:36px} }
            #preview-waveform .wb { width:4px; border-radius:3px; background:#8f6df4; animation:wave-bar 1.1s ease-in-out infinite; }
            #preview-waveform .wb:nth-child(1){animation-delay:0s;height:14px}
            #preview-waveform .wb:nth-child(2){animation-delay:.1s;height:28px}
            #preview-waveform .wb:nth-child(3){animation-delay:.2s;height:36px}
            #preview-waveform .wb:nth-child(4){animation-delay:.15s;height:22px}
            #preview-waveform .wb:nth-child(5){animation-delay:.05s;height:32px}
            #preview-waveform .wb:nth-child(6){animation-delay:.25s;height:18px}
            #preview-waveform .wb:nth-child(7){animation-delay:.35s;height:28px}
            #preview-waveform .wb:nth-child(8){animation-delay:.3s;height:12px}
            #preview-waveform .wb:nth-child(9){animation-delay:.45s;height:24px}
            #preview-waveform .wb:nth-child(10){animation-delay:.4s;height:36px}
            #preview-waveform .wb:nth-child(11){animation-delay:.5s;height:20px}
            #preview-waveform .wb:nth-child(12){animation-delay:.55s;height:30px}
            #preview-waveform .wb:nth-child(13){animation-delay:.6s;height:14px}
            #preview-waveform.stopped .wb { animation:none; height:6px !important; opacity:.3; }
          </style>
          <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
          <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
          <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
          <div class="wb"></div>
        </div>

        <!-- タイマーバー -->
        <div style="background:rgba(255,255,255,.12);border-radius:4px;height:4px;margin-bottom:8px;overflow:hidden;">
          <div id="preview-bar" style="height:100%;background:#8f6df4;width:100%;transition:width 1s linear;"></div>
        </div>
        <p id="preview-timer-label" style="text-align:center;font-size:11px;font-weight:900;color:rgba(255,255,255,.45);margin-bottom:4px;">30秒</p>
        <p id="preview-plays-left" style="text-align:center;font-size:10px;color:rgba(255,255,255,.35);font-weight:800;margin-bottom:16px;"></p>
        <p id="preview-hint-label" style="text-align:center;font-size:11px;color:#a78bf8;font-weight:800;display:none;margin-bottom:12px;">🎵 試聴完了！ヒントが解放されました</p>

        <button id="preview-stop" type="button" style="width:100%;padding:11px;border:1px solid rgba(255,255,255,.15);border-radius:16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:12px;font-weight:900;cursor:pointer;">停止</button>
      </div>
    </div>

    <!-- YouTube IFrame をオフスクリーンに配置（音声のみ再生用） -->
    <div id="preview-player" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true"></div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
